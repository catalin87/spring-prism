spring:
  prism:
    app-secret: example-spring-ai-secret
    locales: UNIVERSAL
    dashboard:
      default-polling-seconds: 15
      audit-retention: 16
      history-retention: 180
      alert-thresholds:
        scan-latency-warn-ms: 20
        scan-latency-critical-ms: 60
management:
  endpoints:
    web:
      exposure:
        include: health,info,prism
