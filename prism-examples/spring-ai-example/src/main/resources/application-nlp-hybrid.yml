spring:
  prism:
    app-secret: ${PRISM_APP_SECRET:replace-me-for-real-deployments}
    locales: UNIVERSAL
    extensions:
      nlp:
        enabled: true
        backend: hybrid
        model-resource: file:${PRISM_NLP_MODEL:./models/en-ner-person.bin}
        confidence-threshold: 4
        blocked-phrases:
          - Spring Boot
          - Redis Cluster
    dashboard:
      default-polling-seconds: 15
      audit-retention: 16
      history-retention: 180
      alert-thresholds:
        scan-latency-warn-ms: 20
        scan-latency-critical-ms: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,prism
