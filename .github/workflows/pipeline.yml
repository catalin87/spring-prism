name: "Spring Prism Continuous Delivery Pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dco-verification:
    name: "Developer Certificate of Origin Check"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository History"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Strict DCO Trailer Check"
        # Enforces that every commit block contains the exact regex formula for Signed-off-by
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            REVS="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            # On direct push to main, check the pushes since last deploy or against HEAD
            REVS="HEAD~1..HEAD"
          fi
          
          for commit in $(git rev-list --no-merges $REVS); do
            if ! git show -s --format=%B $commit | grep -iE "Signed-off-by: .+ <.+@.+>"; then
              echo "::error title=DCO Signed-off-by Missing::Commit $commit is missing the 'Signed-off-by: Name <email>' legal trailer."
              exit 1
            fi
          done

  build-and-secure:
    name: "JDK 21 Engine Build & CVE Scanner"
    runs-on: ubuntu-latest
    needs: dco-verification
    
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Provision JDK 21 (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Compute OWASP cache week"
        id: dependency-check-week
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: "Cache OWASP Dependency-Check data"
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ steps.dependency-check-week.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: "Code Style Guardrails (Spotless + Checkstyle)"
        run: mvn spotless:check checkstyle:check --batch-mode

      - name: "Architectural Compilation & Verification"
        run: mvn clean verify --batch-mode

      - name: "OWASP Dependency Vulnerability Scan"
        # Executes deep CVE inspection exclusively for our 3rd-party integration layers
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::warning title=CVE Scanner Disabled::Skipping OWASP dependency-check. Please add NVD_API_KEY to GitHub Secrets to prevent 429 API rate limits!"
          else
            set +e
            mvn org.owasp:dependency-check-maven:aggregate \
              -DfailBuildOnCVSS=7 \
              -DnvdApiKey=$NVD_API_KEY \
              -DossIndexAnalyzerEnabled=false \
              -DdataDirectory=$HOME/.m2/repository/org/owasp/dependency-check-data \
              --batch-mode | tee dependency-check.log
            status=${PIPESTATUS[0]}
            set -e

            if [ "$status" -ne 0 ]; then
              if grep -Eq "Error updating the NVD Data|connectionPool\" is null|Failed to process CVE-|NVD Returned Status Code: 403" dependency-check.log; then
                echo "::warning title=CVE Scanner Infrastructure Failure::OWASP dependency-check could not update NVD data. Check the NVD_API_KEY secret or retry the workflow; continuing without blocking this build."
              else
                exit "$status"
              fi
            fi
          fi

      - name: "Store JaCoCo Coverage Evidence"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-reports
          path: "**/target/site/jacoco/"
          retention-days: 30
