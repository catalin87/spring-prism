name: "Spring Prism Release Pipeline"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  # ── Job 1: Validate ──────────────────────────────────────────────────────────
  validate:
    name: "Pre-Release Build Validation"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Tag"
        uses: actions/checkout@v4

      - name: "Provision JDK 21 (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Full Verification Suite"
        # Runs Spotless, Checkstyle, all unit tests, and JaCoCo 90% gate
        run: mvn clean verify --batch-mode

  # ── Job 2: Publish to Maven Central ─────────────────────────────────────────
  publish:
    name: "Sign, Stage & Release to Maven Central"
    runs-on: ubuntu-latest
    needs: validate
    environment: maven-central-release  # Requires manual gate approval in GitHub Environments

    steps:
      - name: "Checkout Tag"
        uses: actions/checkout@v4

      - name: "Provision JDK 21 (Temurin) with Maven Settings"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          # Injects server credentials into ~/.m2/settings.xml automatically
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: "Strip SNAPSHOT Suffix Sanity Check"
        # Prevents accidentally releasing a SNAPSHOT version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$VERSION" == *"SNAPSHOT"* ]]; then
            echo "::error title=Release Blocked::Cannot release a SNAPSHOT version ($VERSION). Update pom.xml first."
            exit 1
          fi
          echo "Releasing version: $VERSION"

      - name: "Deploy, Sign & Auto-Release to Maven Central"
        # The -Prelease profile activates GPG signing, javadoc, and source jars.
        # nexus-staging-maven-plugin with autoReleaseAfterClose=true handles the
        # Close → Release sequence automatically — no manual Sonatype portal click needed.
        env:
          CENTRAL_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn clean deploy \
            -Prelease \
            -DskipTests \
            --batch-mode \
            --no-transfer-progress

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/target/*.jar
